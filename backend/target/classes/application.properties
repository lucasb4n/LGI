spring.datasource.url=jdbc:mysql://localhost:3306/lgi?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=k15720
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Habilita logs mais verbosos do Hibernate para debugging de schema/metadata
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE
logging.level.org.hibernate.tool.schema=DEBUG

server.port=8080

# Evita consultas de metadata JDBC que causam erro 'Unknown column RESERVED'
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# Configuração de Email (SMTP) - Preencha com seus dados reais para funcionar
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=seu-email@gmail.com
spring.mail.password=sua-senha-de-app
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
